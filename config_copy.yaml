name: GitHub Issue Manager
description: for github backup of data
api_base_url: https://api.github.com
required_secrets:
- env_name: GITHUB_LLM_SYNC_TOKEN
  description: Env name for GitHub personal token specified for LLM chat history sync
    with repo access
github_repo:
  remote_url: https://github.com/your-name/your-repo.git
  description: your corresponding github repo to save conversation history data
